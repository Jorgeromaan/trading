name: EMA50 MTF Alert

on:
  schedule:
    - cron: '*/5 * * * *'   # mínimo permitido por GitHub: cada 5 minutos
  workflow_dispatch:        # te permite lanzarlo a mano para probar

permissions:
  contents: write

jobs:
  check-strategy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar estrategia
        env:
          SYMBOL: BTCUSDT          # cambia el par aquí
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          MAX_WAIT_HOURS: "6"
        run: python ema50_mtf_alert.py

      - name: Guardar estado en el repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update state [skip ci]"
          git push